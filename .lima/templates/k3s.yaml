# Deploy kubernetes via k3s (which installs a bundled containerd).
# $ limactl start ~/.lima/templates/k3s.yaml
# $ limactl shell k3s kubectl
#
# The kubeconfig is automatically merged into ~/.kube/config on VM start.
# The k3s cluster is accessible from the host via the lima0 network interface.
# Simply use kubectl directly:
#
# $ kubectl config use-context k3s
# $ kubectl get nodes
# NAME       STATUS   ROLES           AGE   VERSION
# lima-k3s   Ready    control-plane   69s   v1.34.4+k3s1

minimumLimaVersion: 2.0.0

# Mounts are disabled in this template, but can be enabled optionally.
mounts:
  - location: "~/.kube" # Host path (writable)
    mountPoint: "/host-kube"
    writable: true

# Using vzNAT is required for the k3s cluster to be accessible from the host.
networks:
  - vzNAT: true

# containerd is managed by k3s, not by Lima, so the values are set to false here.
containerd:
  system: false
  user: false
provision:
  - mode: system
    script: |
      #!/bin/sh
      if [ ! -d /var/lib/rancher/k3s ]; then
        # Get the IP address of lima0 interface
        LIMA_IP=$(ip -4 addr show lima0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
        
        # Install k3s
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --node-ip ${LIMA_IP} --advertise-address ${LIMA_IP} --bind-address ${LIMA_IP}" sh -

        # Rename cluster from default to k3s
        KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
        kubectl config rename-context default k3s
        kubectl config set-context k3s --cluster=k3s
        
        # Merge the k3s kubeconfig with the host ~/.kube/config
        KUBECONFIG="/host-kube/config:/etc/rancher/k3s/k3s.yaml" kubectl config view --flatten > /tmp/kubectl-merged.tmp
      fi
probes:
  - script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until test -f /etc/rancher/k3s/k3s.yaml; do sleep 3; done"; then
        echo >&2 "k3s is not running yet"
        exit 1
      fi
    hint: |
      The k3s kubeconfig file has not yet been created.
      Run "limactl shell k3s sudo journalctl -u k3s" to check the log.
      If that is still empty, check the bottom of the log at "/var/log/cloud-init-output.log".
copyToHost:
  - guest: "/tmp/kubectl-merged.tmp"
    host: "{{.Home}}/.kube/config"
    deleteOnStop: false
message: |
  k3s cluster is ready!
  ------
  To use the cluster:
  $ kubectl config use-context k3s
  $ kubectl get nodes
  ------

